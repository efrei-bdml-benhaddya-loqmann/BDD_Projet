<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Réservation de congés{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('mes_conges') }}">🏖️ Mes congés</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('mes_conges') }}">Mes demandes</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('conge_reserver') }}">Réserver</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('calendrier') }}">Calendrier équipe</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('stats') }}">Statistiques</a></li>
        </ul>

        <form class="d-flex align-items-center" method="post" action="{{ url_for('changer_utilisateur') }}">
          <label class="text-white-50 small me-2 mb-0">Connecté en tant que</label>
          <select name="id_employe" class="form-select form-select-sm" style="width:auto"
                  onchange="this.form.submit()">
            {% for emp in tous_employes %}
              <option value="{{ emp.id_employe }}"
                {% if current_user and current_user.id_employe == emp.id_employe %}selected{% endif %}>
                {{ emp.prenom }} {{ emp.nom }}
              </option>
            {% endfor %}
          </select>
        </form>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
